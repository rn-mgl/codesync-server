services:
  codesync-app:
    container_name: codesync-server-app
    build: .
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  database:
    container_name: codesync-database
    image: mysql:9
    volumes:
      - codesync-db:/var/lib/mysql

  javascript-sandbox:
    build: ./sandbox
    image: javascript-sandbox-image
    container_name: codesync-javascript-sandbox
    network_mode: none
    volumes:
      - ./sandbox:/usr/src/app/sandbox
    profiles:
      - sandbox
    command: tail -f /dev/null

volumes:
  codesync-db:
