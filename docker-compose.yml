name: codesync

services:
  backend:
    container_name: codesync-backend
    env_file:
      - .env
    build: .
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - sandbox-data:/app/sandbox
      - uploads:/app/tmp/uploads
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles:
      - app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  worker:
    container_name: codesync-worker
    build: .
    env_file:
      - .env
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy
      database:
        condition: service_healthy
    profiles:
      - app

  database:
    container_name: codesync-database
    image: mysql:9
    volumes:
      - database:/var/lib/mysql
    profiles:
      - app
    ports:
      - "3306:3306"

  nginx:
    container_name: codesync-nginx
    image: nginx:1.31
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    profiles:
      - app
    ports:
      - "80:80"
    depends_on:
      - backend

  redis:
    container_name: codesync-redis
    image: redis:8.8
    profiles:
      - app
    env_file:
      - .env
    command: redis-server --requirepass ${REDIS_PASS}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASS}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  sandbox-cleaner:
    build: ./cleaner
    image: sandbox-cleaner-image
    profiles:
      - sandbox

  javascript-sandbox:
    build:
      context: ./sandbox
      dockerfile: Dockerfile.js
    image: javascript-sandbox-image
    profiles:
      - sandbox

  php-sandbox:
    build:
      context: ./sandbox
      dockerfile: Dockerfile.php
    image: php-sandbox-image
    profiles:
      - sandbox

  java-sandbox:
    build:
      context: ./sandbox
      dockerfile: Dockerfile.java
    image: java-sandbox-image
    profiles:
      - sandbox

volumes:
  sandbox-data:
  database:
  uploads:
