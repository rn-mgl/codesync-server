name: codesync

services:
  backend:
    container_name: codesync-backend
    build: .
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - sandbox-data:/app/sandbox
      - uploads:/app/tmp/uploads
    depends_on:
      - database
    profiles:
      - app

  database:
    container_name: codesync-database
    image: mysql:9
    volumes:
      - database:/var/lib/mysql
    profiles:
      - app
    ports:
      - "3306:3306"

  nginx:
    container_name: codesync-nginx
    image: nginx:1.31
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    profiles:
      - app
    ports:
      - "80:80"

  sandbox-cleaner:
    build: ./cleaner
    image: sandbox-cleaner-image
    profiles:
      - sandbox

  javascript-sandbox:
    build:
      context: ./sandbox
      dockerfile: Dockerfile.js
    image: javascript-sandbox-image
    profiles:
      - sandbox

  php-sandbox:
    build:
      context: ./sandbox
      dockerfile: Dockerfile.php
    image: php-sandbox-image
    profiles:
      - sandbox

  java-sandbox:
    build:
      context: ./sandbox
      dockerfile: Dockerfile.java
    image: java-sandbox-image
    profiles:
      - sandbox

volumes:
  sandbox-data:
  database:
  uploads:
